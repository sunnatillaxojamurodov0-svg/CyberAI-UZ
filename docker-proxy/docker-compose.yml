# ============================================
# CyberAI Docker Proxy - Production Setup
# ============================================

services:
  # ==========================================
  # Docker Proxy Server
  # ==========================================
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cyberai-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:2377:2377"
    environment:
      - DOCKER_API_KEY=${DOCKER_API_KEY}
      - DOCKER_PROXY_PORT=2377
      - MAX_CONTAINERS=${MAX_CONTAINERS:-10}
      - CONTAINER_TTL_MS=${CONTAINER_TTL_MS:-14400000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://app.cyberaiuz.workers.dev}
      - NODE_ENV=production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - cyberai-internal
    healthcheck:
      test:
        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2377/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

# ==========================================
# Networks
# ==========================================
networks:
  cyberai-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
