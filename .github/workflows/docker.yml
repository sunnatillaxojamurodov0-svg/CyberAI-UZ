name: Docker Proxy CI

on:
  push:
    branches: [main]
    paths:
      - "docker-proxy/**"
  pull_request:
    branches: [main]
    paths:
      - "docker-proxy/**"

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/cyberai-proxy
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./docker-proxy
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Test Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t cyberai-proxy-test ./docker-proxy

      - name: Run container
        run: |
          docker run -d --name test-proxy \
            -p 2377:2377 \
            -e DOCKER_API_KEY=test \
            -e DOCKER_HOST=tcp://host.docker.internal:2375 \
            cyberai-proxy-test

      - name: Wait for startup
        run: sleep 5

      - name: Health check
        run: |
          curl -f http://localhost:2377/api/health || exit 1

      - name: Stop container
        run: docker stop test-proxy
        if: always()
